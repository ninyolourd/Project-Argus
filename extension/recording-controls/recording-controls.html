<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Argus Recording</title>
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="recording-controls.css" />
  </head>
  <body>
    <div class="widget" id="widget">
      <span class="dot" id="dot"></span>
      <span class="label" id="label">Ready to record</span>
      <button id="action-btn" class="stop-btn">Start Recording</button>
    </div>
    <p class="hint" id="hint">Tip: in the picker, choose the tab, window, or screen you want to record — not "Argus Recording".</p>
    <script src="recording-controls.js"></script>
  </body>
</html>
